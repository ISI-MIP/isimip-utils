name: CI

on:
  push:
    branches:
    - main
    - test
    tags:
    - "*"
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: read

env:
  PYTHONDONTWRITEBYTECODE: 1
  FORCE_COLOR: 1
  PYTHON_VERSION: "3.11"

jobs:
  test:
    name: Run tests 🧪
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repo 🛎️
      uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Set up Python 🐍
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Restore testing cache 📥
      uses: actions/cache@v4
      with:
        path: |
          testing/datasets
          testing/extractions
          testing/protocol
          testing/share
        key: testing-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('isimip_utils/tests/constants.py') }}
        restore-keys: |
          testing-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

    - name: Install cdo 🌍
      run: |
        sudo apt-get update
        sudo apt-get install -y cdo netcdf-bin --no-install-recommends

    - name: Set up Python 🐍
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: pip

    - name: Install package 📦
      run: pip install -e .[all]

    - name: Run download script 🌐
      run: python testing/download.py

    - name: Run setup script 🔧
      run: python testing/setup.py

    - name: Save testing cache 📤
      if: always()
      uses: actions/cache/save@v4
      with:
        path: |
          testing/datasets
          testing/extractions
          testing/protocol
          testing/share
        key: testing-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('isimip_utils/tests/constants.py') }}

    - name: Run pytest 🧪
      run: pytest --cov=isimip_utils --cov-fail-under=90 --cov-report=term-missing

  build:
    name: Build distribution 👷
    needs: test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo 🛎️
      uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Set up Python 🐍
      uses: actions/setup-python@v6
      with:
        python-version: "3.x"

    - name: Install build 🧱
      run: python3 -m pip install build --user

    - name: Build a binary wheel and a source tarball 🛠️
      run: python3 -m build

    - name: Store the distribution packages 📤
      uses: actions/upload-artifact@v5
      with:
        name: python-package-distributions
        path: dist/

  pypi:
    name: Publish distribution to PyPI 📦
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/isimip-utils

    permissions:
      id-token: write

    steps:
    - name: Download the distribution packages 📥
      uses: actions/download-artifact@v6
      with:
        name: python-package-distributions
        path: dist/

    - name: Publish to PyPI 🚀
      uses: pypa/gh-action-pypi-publish@release/v1

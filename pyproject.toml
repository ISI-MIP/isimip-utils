[project]
name = "isimip-utils"
authors = [
    { name = "Jochen Klar", email = "jochen.klar@pik-potsdam.de" },
]
maintainers = [
    { name = "Jochen Klar", email = "jochen.klar@pik-potsdam.de" },
]
description = "This package contains common functionality for different ISIMIP tools."
readme = "README.md"
requires-python = ">=3.8"
license = { file = "LICENSE" }
classifiers = [
    'Operating System :: OS Independent',
    'License :: OSI Approved :: MIT License',
    'Programming Language :: Python :: 3.9',
    'Programming Language :: Python :: 3.10',
    'Programming Language :: Python :: 3.11',
    'Programming Language :: Python :: 3.12',
    'Programming Language :: Python :: 3.13',
]
dependencies = [
    "netCDF4",
    "python-dotenv",
    "requests",
    "rich",
    "xarray"
]
dynamic = ["version"]

[project.urls]
Repository = "https://github.com/ISI-MIP/isimip-utils"

[project.optional-dependencies]
all = [
    "isimip-utils[plot,shapes]"
]
plot = [
    "altair[all]",
    "palettable",
]
shapes = [
    "geopandas",
    "rioxarray",
]
dev = [
    "build",
    "pre-commit",
    "ruff",
    "twine",
]
docs = [
    "mkdocs",
    "mkdocs-material",
    "mkdocstrings-python",
]

[tool.setuptools]
packages = ["isimip_utils"]

[tool.setuptools.dynamic]
version = { attr = "isimip_utils.__version__" }

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = [
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "E",    # pycodestyle
    "F",    # pyflakes
    "I",    # isort
    "PGH",  # pygrep-hooks
    "RUF",  # ruff
    "UP",   # pyupgrade
    "W",    # pycodestyle
    "YTT",  # flake8-2020
]
ignore = [
    "B006",   # mutable-argument-default
    "B007",   # unused-loop-control-variable
    "B018",   # useless-expression
    "RUF012", # mutable-class-default
]

[tool.ruff.lint.isort]
known-first-party = [
    "isimip_utils"
]
section-order = [
    "future",
    "standard-library",
    "third-party",
    "first-party",
    "local-folder"
]
